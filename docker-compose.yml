services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openbook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./openbook-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/openbook
      UPLOADS_DIR: uploads
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4:e2b
      # OLLAMA_MODEL: deepseek-r1:14b
      # OLLAMA_MODEL: qwen2.5:14b
    volumes:
      - ./openbook-backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./openbook-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
